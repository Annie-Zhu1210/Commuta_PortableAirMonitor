name: commuta_app
description: "Commuta - Air Quality Monitor companion app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.3
  google_maps_flutter: ^2.9.0
  geolocator: ^12.0.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  flutter_dotenv: ^5.1.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  http: ^1.2.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/tfl/lines.json
    - assets/tfl/stations.json